name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: moat
          POSTGRES_PASSWORD: moat
          POSTGRES_DB: moat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U moat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://moat:moat@localhost:5432/moat_test
      TEST_DATABASE_URL: postgresql+psycopg://moat:moat@localhost:5432/moat_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: moat
      POSTGRES_PASSWORD: moat
      POSTGRES_DB: moat
    ports:
      - "5433:5432"
    volumes:
      - moat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moat"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://moat:moat@db:5432/moat
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  moat_pgdata: